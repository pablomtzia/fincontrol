<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Gestor de finanzas personales - Control visual de gastos, ingresos e inversiones">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="fincontrol">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <title>fincontrol</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="logo-text">fincontrol</span>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active" data-view="dashboard" id="nav-dashboard">
                <span class="nav-label">Dashboard</span>
            </button>
            <button class="nav-item" data-view="income" id="nav-income">
                <span class="nav-label">Ingresos</span>
            </button>
            <button class="nav-item" data-view="expenses" id="nav-expenses">
                <span class="nav-label">Gastos</span>
            </button>
            <button class="nav-item" data-view="investments" id="nav-investments">
                <span class="nav-label">Inversiones</span>
            </button>
            <button class="nav-item" data-view="settings" id="nav-settings">
                <span class="nav-label">Ajustes</span>
            </button>
        </nav>

        <!-- Month Selector -->
        <div class="month-selector">
            <button class="month-btn" id="prevMonth">&#8249;</button>
            <span class="month-label" id="currentMonthLabel">Marzo 2026</span>
            <button class="month-btn" id="nextMonth">&#8250;</button>
        </div>
    </aside>

    <!-- Mobile Top Bar -->
    <header class="mobile-header" id="mobileHeader">
        <button class="hamburger" id="hamburgerBtn">&#9776;</button>
        <span class="mobile-title">fincontrol</span>
        <div class="mobile-month">
            <button class="month-btn-sm" id="prevMonthMobile">&#8249;</button>
            <span id="currentMonthMobile">Mar 2026</span>
            <button class="month-btn-sm" id="nextMonthMobile">&#8250;</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Views rendered here dynamically -->
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Quick Add Bar -->
    <div class="quickadd-bar" id="quickAddBar">
        <div class="quickadd-inner">
            <input type="text" class="quickadd-input" id="quickAddInput" placeholder="Ej: mercadona 50"
                autocomplete="off" enterkeyhint="send">
            <button class="quickadd-btn" id="quickAddBtn" title="Añadir gasto">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
        <div class="quickadd-preview" id="quickAddPreview"></div>
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/app.js"></script>
    <script>
        (async () => {
            if ('caches' in window) {
                const keys = await caches.keys();
                for (const k of keys) {
                    if (k !== 'fincontrol-v2.5') await caches.delete(k);
                }
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js');
            }
        })();
    </script>
</body>

</html>
